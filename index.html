      <div style={{ width: 15, height: 15, flexShrink: 0, marginTop: 3, border: `1px solid ${checked ? "#2a8a4a" : MUTED}`, background: checked ? "#2a8a4a" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#fff", fontWeight: 900, transition: "all 0.15s" }}>
        {checked ? "✓" : ""}

      </div>

    </div>
  );
}

function SecretSection({ secret, pin }) {
  const [open, setOpen]         = useState(false);
  const [unlocked, setUnlocked] = useState(false);
  const [val, setVal]           = useState("");
  const [err, setErr]           = useState(false);
  const [shake, setShake]       = useState(false);

  const tryPin = (input) => {
    if (input === pin) { setUnlocked(true); }
    else { setErr(true); setShake(true); setVal(""); setTimeout(() => setShake(false), 500); }
  };

  if (!open) return (
    <div onClick={() => setOpen(true)} style={{ border: `1px dashed ${PURPLE}`, background: CARD, marginTop: 12, padding: "14px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
      <div style={{ fontSize: 24 }}>🔐</div>
      <div>
        <div style={{ fontSize: 12, color: PURPLE, letterSpacing: "0.15em" }}>GEHEIMAUFTRAG VERFÜGBAR</div>
        <div style={{ fontSize: 11, color: MUTED, marginTop: 3 }}>Nur du darfst das sehen · Persönlicher PIN · Antippen zum Öffnen</div>
      </div>
    </div>
  );

  if (!unlocked) return (
    <div style={{ border: `1px solid ${PURPLE}`, background: CARD, marginTop: 12 }}>
      <div style={{ background: "#140f28", padding: "8px 16px", fontSize: 11, letterSpacing: "0.2em", color: PURPLE }}>🔐 GEHEIMAUFTRAG · PERSÖNLICHEN PIN EINGEBEN</div>
      <div style={{ padding: "20px 16px", textAlign: "center" }}>
        <div style={{ fontSize: 11, color: MUTED, letterSpacing: "0.12em", marginBottom: 16 }}>Deinen persönlichen Code eingeben</div>
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 12, transform: shake ? "translateX(5px)" : "none", transition: "transform 0.08s" }}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{ width: 42, height: 50, border: `1px solid ${err ? RED : val.length > i ? ACCENT : BORDER}`, background: "#0d0d18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, color: ACCENT, fontFamily: "monospace", transition: "border-color 0.2s" }}>
              {val.length > i ? "●" : ""}
            </div>
          ))}
        </div>
        {err && <div style={{ fontSize: 11, color: RED, marginBottom: 12, letterSpacing: "0.1em" }}>FALSCHER CODE – ZUGRIFF VERWEIGERT</div>}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 52px)", gap: 8, justifyContent: "center" }}>
          {["1","2","3","4","5","6","7","8","9","⌫","0","✓"].map(k => (
            <button key={k} onClick={() => {
              if (k === "⌫") { setVal(v => v.slice(0,-1)); setErr(false); }
              else if (k === "✓") { tryPin(val); }
              else if (val.length < 4) { const nv = val+k; setVal(nv); setErr(false); if (nv.length===4) setTimeout(()=>tryPin(nv),120); }
            }} style={{ width: 52, height: 52, background: k==="✓" ? PURPLE : "#0d0d18", border: `1px solid ${k==="✓" ? PURPLE : BORDER}`, color: TEXT, fontSize: k==="⌫" ? 16 : 20, fontFamily: "monospace", cursor: "pointer" }}>{k}</button>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ border: `1px solid ${PURPLE}`, background: CARD, marginTop: 12 }}>
      <div style={{ background: "#140f28", padding: "8px 16px", fontSize: 11, letterSpacing: "0.15em", color: "#a080ff" }}>✅ GEHEIMAUFTRAG FREIGESCHALTET: {secret.title.toUpperCase()}</div>
      {secret.items.map((item, i) => (
        <div key={i} style={{ padding: "12px 16px", borderBottom: i < secret.items.length-1 ? `1px solid ${BORDER}` : "none" }}>
          <div style={{ fontSize: 13, color: "#c0b0ff", lineHeight: 1.45 }}>🎯 {item.name}</div>
          <div style={{ fontSize: 11, color: MUTED, fontStyle: "italic", marginTop: 4, lineHeight: 1.45 }}>{item.note}</div>
        </div>
      ))}
      <div style={{ padding: "10px 16px", background: "#1a1030", fontSize: 11, color: "#aa88ff", borderTop: "1px solid #2a1060" }}>⚠️ {secret.warning}</div>
    </div>
  );
}

        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
          {geheimKeys.map(n => (
            <button key={n} onClick={()=>setActive(n)} style={{ fontFamily:"monospace", fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase", padding:"7px 13px", border:`1px solid ${active===n?PURPLE:BORDER}`, background:active===n?PURPLE:CARD, color:active===n?"#fff":MUTED, cursor:"pointer", transition:"all 0.15s" }}>
              {data[n].emoji} {data[n].label}
            </button>
          ))}
        </div>
        <div style={{ fontSize: 10, color: "#60a0f0", letterSpacing: "0.2em", marginBottom: 6, paddingLeft: 2 }}>● EINGEWEIHT</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {eingeweihtKeys.map(n => (
            <button key={n} onClick={()=>setActive(n)} style={{ fontFamily:"monospace", fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase", padding:"7px 13px", border:`1px solid ${active===n?"#60a0f0":BORDER}`, background:active===n?"#1d3a6a":CARD, color:active===n?"#90c0ff":MUTED, cursor:"pointer", transition:"all 0.15s" }}>
              {data[n].emoji} {data[n].label}
            </button>
          ))}
        </div>
      </div>

      {!active && (
        <div style={{ textAlign:"center", padding:"48px 16px", color:MUTED, fontSize:12, letterSpacing:"0.1em", lineHeight:2.5 }}>
          <div style={{ fontSize:36, marginBottom:8 }}>☝️</div>
          Akte auswählen, um Briefing zu öffnen.<br />
          <span style={{ fontSize:10, opacity:0.4 }}>Unbefugter Zugriff wird mit Mittelgang-Sitzplatz geahndet.</span>
        </div>
      )}

      {active && person && (
        <div style={{ maxWidth: 640, margin: "0 auto" }}>
          <div style={{ border:`1px solid ${person.group==="eingeweiht"?"#60a0f0":ACCENT}`, background:CARD, padding:20, marginBottom:14, position:"relative" }}>
            <div style={{ position:"absolute", top:-1, right:14, background:person.group==="eingeweiht"?"#1d4ed8":RED, color:"#fff", fontSize:9, letterSpacing:"0.15em", padding:"2px 8px" }}>
              {person.group==="eingeweiht"?"EINGEWEIHT":"GEHEIMAKTE"}
            </div>
            <div style={{ fontSize:26, fontWeight:900, color:person.group==="eingeweiht"?"#90c0ff":ACCENT, fontFamily:"sans-serif" }}>{person.emoji} {person.label}</div>
            <div style={{ color:MUTED, fontSize:11, fontStyle:"italic", marginTop:4, marginBottom:12 }}>{person.deckname}</div>
            <div style={{ color:"#8888aa", fontSize:12, lineHeight:1.7, borderLeft:`2px solid ${person.group==="eingeweiht"?"#60a0f0":PURPLE}`, paddingLeft:12 }}>{person.bio}</div>
          </div>

          <div style={{ marginBottom:12 }}>
            <div style={{ background:"#1a1a2e", height:3 }}>
              <div style={{ height:"100%", background:person.group==="eingeweiht"?"#60a0f0":ACCENT, width:`${progress.pct}%`, transition:"width 0.3s" }} />
            </div>
            <div style={{ textAlign:"right", fontSize:11, color:MUTED, marginTop:4 }}>{progress.done} / {progress.total} eingepackt</div>
          </div>

          {person.sections.map((sec,si) => (
            <div key={si} style={{ border:`1px solid ${BORDER}`, background:CARD, marginBottom:10 }}>
              <div style={{ background:"#1a1a2e", padding:"8px 16px", fontSize:10, letterSpacing:"0.2em", textTransform:"uppercase", color:person.group==="eingeweiht"?"#60a0f0":ACCENT }}>{sec.title}</div>
              {sec.items.map((item,ii) => (
                <CheckItem key={ii} item={item} checked={!!checked[active][`${si}-${ii}`]} onToggle={()=>toggle(active,si,ii)} />
              ))}
            </div>
          ))}

          <SecretSection key={active} secret={person.secret} pin={PINS[active]} />

          <div style={{ border:"1px solid #7a1515", padding:"12px 16px", textAlign:"center", fontSize:12, color:MUTED, lineHeight:1.8, marginTop:12 }}>
            <span style={{ color:RED, fontWeight:"bold" }}>HINWEIS: </span>{person.warning}
          </div>
        </div>
      )}

      <div style={{ textAlign:"center", marginTop:48, color:"#222230", fontSize:10, letterSpacing:"0.15em", lineHeight:2.5 }}>
        <div>#BEST-TEAM GOES ████████████</div>
        <div>Geheimkomitee · Destination nicht bestätigt · Alle Angaben ohne Gewähr</div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
